<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validated Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 450px;
            margin: 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .gender {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .gender label {
            font-weight: normal;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        input:invalid {
            border: 2px solid red;
        }

        input:valid {
            border: 2px solid green;
        }

        textarea:invalid,
        select:invalid {
            border: 2px solid red;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Registration Form</h2>

        <form>

            <label>Full Name</label>
            <input type="text" required pattern="[A-Za-z ]{3,30}" title="Only letters and spaces (3-30 characters)">

            <label>Email</label>
            <input type="email" required placeholder="example@gmail.com">

            <label>Password</label>
            <input type="password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                title="Minimum 8 characters with uppercase, lowercase and number">

            <label>Confirm Password</label>
            <input type="password" required>

            <label>Phone Number</label>
            <input type="tel" required pattern="[0-9]{10}" title="Enter exactly 10 digits">

            <label>Age</label>
            <input type="number" required min="18" max="100">

            <label>Date of Birth</label>
            <input type="date" required>

            <label>Gender</label>
            <div class="gender">
                <label><input type="radio" name="gender" required> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>

            <label>Country</label>
            <select required>
                <option value="">Select Country</option>
                <option>Nepal</option>
                <option>India</option>
                <option>USA</option>
                <option>Australia</option>
                <option>Japan</option>
            </select>

            <label>Website</label>
            <input type="url" placeholder="https://example.com" required>

            <label>Address</label>
            <textarea required minlength="10" maxlength="150" rows="4" placeholder="Enter your address"></textarea>

            <div class="checkbox">
                <input type="checkbox" required>
                <label>I agree to the Terms & Conditions</label>
            </div>

            <button type="submit">Register</button>

        </form>

    </div>

</body>

</html>
