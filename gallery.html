<!DOCTYPE html>
<html>
<head>
    <title> Gallery</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:white;
            text-align: center;
        }

        h2{
            margin-top: 20px;
        }

        .gallery{
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 40px;
            justify-content: center;
            margin-top: 50px;
        }

        .box{
            width: 120px;
            height: 120px;
            border: 2px solid white;
            background-color:blue;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2> Gallery</h2>

    <div class="gallery">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>

</body>
</html>
