<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

body{
    background:#f5f5f5 ;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;

}
.card{
    width: 320px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
}

.profile{
    position: relative;
width: 10px;
border-radius: 50%;
}

.profile img{
width:100px;
height: 100px;
border-radius: 50%;

} 

.status{
    position: absolute;
    top: 5px;
    right: 5px;
    width: 16px;
    height: 16px;
    background: green;
    border-radius: 50%;
    border: 2px solid white;
}

h2{
margin-top: 5px;
font-size: 32px;
font-weight: bold;

}

h3{
margin-top: 5px;
color: #444;
font-size: 20px;
font-weight: normal;

}

.bio{
margin-top: 15px;
height: 100px;
overflow-y: auto;
text-align: left;
line-height: 1.5;
font-size: 16x;
}

footer{
margin-top: 25px;
font-size: 18px;
}

footer span{
color: #008b8b;

}

</style>
</head>

    
<body>
<div class="card">

    <div class="profile">
        
        <img src="https://via.placeholder.com/100"alert="profile">
<span class="status"></span>

    </div>

    <h2> Jane Done</h2>
<h3>Fontend Developer</h3>
<div class="bio">
  <b> property. this text is intentionally long 
   so the bio box overflows and you can 
   see the scrollbar appear inside the
   box instead of pushing the card taller</b>.
</div>

<footer>
   
    
</footer>
</div>
</body>
</html>
