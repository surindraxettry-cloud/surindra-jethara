<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan Example</title>
</head>
<body>

<h2 align="left">Spanning Multiple Rows and Columns</h2>

<table border="1" cellpadding="10" cellspacing="0">

    <tr>
        <td rowspan="2"><B>Team A</B></td>
        <td><b>Alice</b></td>
    </tr>

    <tr>
        <td><b>Bob</b></td>
    </tr>

    <tr>
        <td colspan="2" align="center"><I>Total Members:</I> 2</td>
    </tr>

</table>

</body>
</html>
